name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files (package com.task)
        run: flutter create . --project-name task --org com --platforms android

      - name: Set minimum SDK to 23 (required by Firebase)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/flutter.minSdkVersion/23/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/flutter.minSdkVersion/23/' android/app/build.gradle
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload full build folder
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-build-folder
          path: build/app/outputs/flutter-apk/
